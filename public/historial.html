<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historial de Pedidos - Cerrajería ALBA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
        Cerrajería <strong>ALBA</strong>
      </div>
      <ul class="nav-links">
        <a href="index.html">🏠 Inicio</a>
        <a href="carrito.html">🛒 Carrito</a>
        <a href="login.html">Mi cuenta</a>
      </ul>
    </nav>
  </header>

  <main class="tienda-container">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Historial de Pedidos</h1>
    <section id="contenedor-historial" class="productos-grid">
      <!-- Pedidos cargados aquí -->
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Cerrajería ALBA</p>
  </footer>

  <script>
    const usuario = JSON.parse(localStorage.getItem('usuario'));
    if (!usuario || !usuario.id_usuario) {
      alert('⚠️ No has iniciado sesión.');
      window.location.href = 'login.html';
    }

    const id_usuario = usuario.id_usuario;
    console.log('👤 Usuario cargado:', usuario);
    console.log('🔍 Consultando historial de ID:', id_usuario);

   fetch(`http://localhost:3000/api/historial`)
      .then(res => res.json())
      .then(data => {
        const contenedor = document.getElementById('contenedor-historial');

        if (data.length === 0) {
          contenedor.innerHTML = '<p>No tienes pedidos registrados.</p>';
          return;
        }

        data.forEach(pedido => {
          const pedidoDiv = document.createElement('div');
          pedidoDiv.classList.add('producto');

          pedidoDiv.innerHTML = `
            <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;">
              <h3 style="color: var(--primary-color);">Pedido #${pedido.id_pedido}</h3>
              <p style="font-size: 0.85rem; color: var(--text-muted);">${pedido.fecha_pedido}</p>
            </div>
            <p><strong>Estado:</strong> <span style="color: var(--secondary-color); font-weight: 600;">${pedido.estado_pedido}</span></p>
            <p><strong>Total:</strong> <span class="precio" style="font-size: 1.1rem; margin-top: 5px;">$${pedido.total}</span></p>
            <p><strong>Envío:</strong> ${pedido.direccion_envio || 'No registrada'}</p>
            <p><strong>Estado Envío:</strong> <span style="background: var(--border-color); padding: 2px 8px; border-radius: 12px; font-size: 0.85rem;">${pedido.estado_envio || 'Pendiente'}</span></p>
          `;

          contenedor.appendChild(pedidoDiv);
        });
      })
      .catch(error => {
        console.error('❌ Error al consultar historial:', error);
      });
  </script>
</body>
</html>
