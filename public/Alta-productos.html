    <!-- Main Content -->
    <main class="main-content">
      <div class="admin-header">
        <h1>Inventario / Alta de Productos</h1>
      </div>

  

  <form id="form-producto">
    <label>Nombre:</label>
    <input type="text" name="nombre" required>

    <label>Descripción:</label>
    <input type="text" name="descripcion" required>

    <label>Precio:</label>
    <input type="number" name="precio" step="0.01" required>

    <label>Cantidad en stock:</label>
    <input type="number" name="cantidad_stock" required>

    <label>Categoría (ID):</label>
    <input type="number" name="id_categoria" required>

    <label>Proveedor (ID):</label>
    <input type="number" name="id_proveedor" required>

    <button type="submit">Guardar producto</button>
  </form>

  <p id="mensaje"></p>

  <h2>Productos registrados</h2>
  <div class="table-container">
  <table border="1" id="tabla-productos">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Categoría</th>
        <th>Proveedor</th>
        <th>Acciones</th> <!-- ✅ columna añadida -->
      </tr>
    </thead>
    <tbody>
      <!-- Productos cargados dinámicamente -->
    </tbody>
  </table>
  </div>

  <script>
    // ✅ Enviar nuevo producto al backend
    document.getElementById('form-producto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const datos = Object.fromEntries(new FormData(e.target));

      const res = await fetch('http://localhost:3000/api/productos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      const data = await res.json();

      document.getElementById('mensaje').textContent = data.mensaje;
      if (data.exito) {
        e.target.reset();
        cargarProductos(); // recargar la tabla
      }
    });

    // ✅ Cargar productos en la tabla
    async function cargarProductos() {
      const res = await fetch('http://localhost:3000/api/productos');
      const productos = await res.json();
      const tbody = document.querySelector('#tabla-productos tbody');
      tbody.innerHTML = '';

      productos.forEach(p => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
          <td>${p.id_producto}</td>
          <td contenteditable="true">${p.nombre}</td>
          <td contenteditable="true">${p.descripcion}</td>
          <td contenteditable="true">${p.precio}</td>
          <td contenteditable="true">${p.cantidad_stock}</td>
          <td contenteditable="true">${p.id_categoria || ''}</td>
          <td contenteditable="true">${p.id_proveedor || ''}</td>
          <td>
            <button onclick="guardarEdicion(${p.id_producto}, this)">💾</button>
            <button onclick="eliminarProducto(${p.id_producto})">🗑️</button>
          </td>
        `;
        tbody.appendChild(fila);
      });
    }

    // ✅ Guardar edición de producto
    function guardarEdicion(id, btn) {
      const fila = btn.closest('tr');
      const celdas = fila.querySelectorAll('td');

      const datos = {
        nombre: celdas[1].textContent,
        descripcion: celdas[2].textContent,
        precio: parseFloat(celdas[3].textContent),
        cantidad_stock: parseInt(celdas[4].textContent),
        id_categoria: parseInt(celdas[5].textContent),
        id_proveedor: parseInt(celdas[6].textContent)
      };

      fetch(`http://localhost:3000/api/productos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      })
      .then(res => res.json())
      .then(data => {
        alert(data.mensaje);
        cargarProductos();
      });
    }

    // ✅ Eliminar producto
    function eliminarProducto(id) {
      if (!confirm('¿Eliminar este producto?')) return;

      fetch(`http://localhost:3000/api/productos/${id}`, {
        method: 'DELETE'
      })
      .then(res => res.json())
      .then(data => {
        alert(data.mensaje);
        cargarProductos();
      });
    }

    // ✅ Ejecutar al cargar la página
    document.addEventListener('DOMContentLoaded', cargarProductos);
  </script>

    </main>
  </div>
</body>
</html>
