<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forjas - Cerrajería ALBA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header class="header">
    <nav class="navbar">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)">
          <path
            d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4">
          </path>
        </svg>
        Cerrajería <strong>ALBA</strong>
      </div>
      <ul class="nav-links">
        <a href="index.html"> Inicio</a>
        <a href="carrito.html"> Carrito</a>
        <a href="login.html">Mi cuenta</a>
      </ul>
    </nav>
  </header>

  <main class="tienda-container">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; color: var(--secondary-color);">Categoría:
      Forjas</h1>
    <section id="productos" class="productos-grid">

    </section>
  </main>

  <footer>
    <p>&copy; 2025 Cerrajería ALBA</p>
  </footer>
  <script src="js/carrito.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('http://localhost:3000/api/productos')
        .then(res => res.json())
        .then(productos => {
          const contenedor = document.getElementById('productos');

          const forjas = productos.filter(p => p.categoria.toLowerCase() === 'forjas');

          forjas.forEach(p => {
            const tarjeta = document.createElement('div');
            tarjeta.classList.add('producto-card');

            const nombreImagen = encodeURIComponent(p.nombre); // Soporta espacios

            tarjeta.innerHTML = `
              <img src="img/${nombreImagen}.jpg" alt="${p.nombre}">
              <h2>${p.nombre}</h2>
              <p>${p.descripcion}</p>
              <span class="precio">$${p.precio}</span>
              <button onclick="agregarAlCarrito(${p.id_producto}, '${p.nombre}', ${p.precio})">Agregar al carrito</button>
            `;

            contenedor.appendChild(tarjeta);
          });
        })
        .catch(err => console.error('Error al cargar productos:', err));
    });
  </script>



</body>

</html>
